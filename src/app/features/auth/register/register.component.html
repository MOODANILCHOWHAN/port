<div class="page">
  <div class="card">
    <div class="logo">PortfolioForge</div>
    <p class="sub">Create your free account.</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field"><label>Full Name</label><input formControlName="name" placeholder="Jane Doe" /></div>
      <div class="field"><label>Email</label><input formControlName="email" type="email" placeholder="jane@example.com" /></div>
      <div class="field"><label>Password</label><input formControlName="password" type="password" placeholder="Min 6 characters" /></div>
      <div class="api-err" *ngIf="apiError()">{{ apiError() }}</div>
      <button type="submit" [disabled]="loading()">{{ loading() ? "Creating…" : "Create Account →" }}</button>
    </form>
    <p class="foot">Already registered? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
